services:

  swag:
    image: lscr.io/linuxserver/swag
    container_name: netmanager_swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - URL=${DOMAIN}
      - SUBDOMAINS=
      - VALIDATION=dns
      - CERTPROVIDER=
      - DNSPLUGIN=cloudflare
      - EMAIL=${EMAIL}
      - ONLY_SUBDOMAINS=false
      - EXTRA_DOMAINS=
      - STAGING=false
    volumes:
      - ./swag:/config
    ports:
      - 443:443
    restart: unless-stopped
    networks:
      - netmanager_net

  nginx:
    image: nginx:1.27-alpine
    container_name: netmanager_nginx
    ports:
      - "8081:80"
    volumes:
      - ./app/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/public:/var/www/html/public:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - netmanager_net

  app:
    build: ./app
    container_name: netmanager_app
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - APP_SECRET=${APP_SECRET}
    volumes:
      - ./app:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - netmanager_net

  db:
    image: postgres:16-alpine
    container_name: netmanager_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - netmanager_db:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - netmanager_net

networks:
  netmanager_net:
    driver: bridge

volumes:
  netmanager_db:
