## Network Manager — SWAG subdomain proxy config
## Access the app at: https://netmanager.yourdomain.com
##
## Prerequisites:
##   - SWAG is running with a valid cert covering netmanager.yourdomain.com
##   - The netmanager stack is running (docker compose up -d)
##   - Both SWAG and the netmanager stack share the netmanager_net Docker network

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name netmanager.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 1m;

    # ── Proxy headers ────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Upstream ─────────────────────────────────────────────────────────────
    # Option A (recommended): shared Docker network — use container name directly
    set $upstream_app   netmanager_nginx;
    set $upstream_port  80;
    set $upstream_proto http;

    # Option B: host networking (no shared Docker network)
    # set $upstream_app   172.17.0.1;   # Docker host IP or server LAN IP
    # set $upstream_port  8081;          # Host port from docker-compose
    # set $upstream_proto http;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Main proxy pass ──────────────────────────────────────────────────────
    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
