events {}

http {
    include      mime.types;
    default_type application/octet-stream;

    # Docker's internal DNS resolver — required for variable-based upstream
    # so nginx doesn't hard-fail at startup if the app container isn't ready yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        root   /var/www/html/public;
        index  index.php;

        # Resolve real client IP from X-Real-IP, but only when the connection
        # arrives from SWAG's known static address. Any other source (direct
        # localhost access, other containers) is not trusted, so $remote_addr
        # stays as the actual TCP connection IP and cannot be spoofed via headers.
        set_real_ip_from 172.25.0.2;
        real_ip_header   X-Real-IP;

        add_header X-Content-Type-Options        "nosniff"                                    always;
        add_header X-Frame-Options               "DENY"                                       always;
        add_header Referrer-Policy               "strict-origin-when-cross-origin"            always;
        add_header Content-Security-Policy       "default-src 'self'; img-src 'self' data:;" always;
        add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains"        always;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            set $php_upstream app:9000;
            fastcgi_pass  $php_upstream;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include       fastcgi_params;
        }

        location ~ /\. {
            deny all;
        }
    }
}
